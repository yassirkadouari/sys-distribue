# ============================================================
# Byzantine Consensus — Docker Compose
# 4 nodes (3f+1 with f=1): 3 honest + 1 byzantine
# ============================================================
version: '3.8'

services:
  # ---- Node 0: Leader (honest) ----
  node0:
    build: .
    container_name: bft-node-0
    hostname: node0
    environment:
      NODE_ID: 0
      TOTAL_NODES: 4
      FAULT_TOLERANCE: 1
      NODE_PORT: 5000
      METRICS_PORT: 8080
      BYZANTINE_TYPE: none
      PEERS: "0=node0:5000,1=node1:5000,2=node2:5000,3=node3:5000"
    ports:
      - "5000:5000"
      - "8080:8080"
    networks:
      - bft-network
    restart: unless-stopped

  # ---- Node 1: Replica (honest) ----
  node1:
    build: .
    container_name: bft-node-1
    hostname: node1
    environment:
      NODE_ID: 1
      TOTAL_NODES: 4
      FAULT_TOLERANCE: 1
      NODE_PORT: 5000
      METRICS_PORT: 8080
      BYZANTINE_TYPE: none
      PEERS: "0=node0:5000,1=node1:5000,2=node2:5000,3=node3:5000"
    ports:
      - "5001:5000"
      - "8081:8080"
    networks:
      - bft-network
    restart: unless-stopped

  # ---- Node 2: Replica (honest) ----
  node2:
    build: .
    container_name: bft-node-2
    hostname: node2
    environment:
      NODE_ID: 2
      TOTAL_NODES: 4
      FAULT_TOLERANCE: 1
      NODE_PORT: 5000
      METRICS_PORT: 8080
      BYZANTINE_TYPE: none
      PEERS: "0=node0:5000,1=node1:5000,2=node2:5000,3=node3:5000"
    ports:
      - "5002:5000"
      - "8082:8080"
    networks:
      - bft-network
    restart: unless-stopped

  # ---- Node 3: BYZANTINE node (configurable attack) ----
  node3:
    build: .
    container_name: bft-node-3
    hostname: node3
    environment:
      NODE_ID: 3
      TOTAL_NODES: 4
      FAULT_TOLERANCE: 1
      NODE_PORT: 5000
      METRICS_PORT: 8080
      BYZANTINE_TYPE: silent    # Change to: silent | equivocation | replay
      PEERS: "0=node0:5000,1=node1:5000,2=node2:5000,3=node3:5000"
    ports:
      - "5003:5000"
      - "8083:8080"
    networks:
      - bft-network
    restart: unless-stopped

  # ---- Dashboard (nginx serving static files) ----
  dashboard:
    image: nginx:alpine
    container_name: bft-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bft-network
    depends_on:
      - node0
      - node1
      - node2
      - node3
    restart: unless-stopped

networks:
  bft-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
