server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy metrics endpoints to actual nodes
    # The dashboard JS connects directly to mapped ports on the host,
    # so no proxy is strictly needed. But for internal access:
    location /api/node0/ {
        proxy_pass http://node0:8080/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /api/node1/ {
        proxy_pass http://node1:8080/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /api/node2/ {
        proxy_pass http://node2:8080/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location /api/node3/ {
        proxy_pass http://node3:8080/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }
}
